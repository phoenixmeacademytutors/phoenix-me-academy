<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Phoenix M & E Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="registration-form">
<div style="text-align: center; width: 100%; margin-bottom: 20px;">
    <img src="logo.jpeg" alt="Phoenix Academy Logo" style="width: 200px; height: auto; display: inline-block; border-radius: 10px;">
</div>


        <h2>Student Registration</h2>
        <form id="enrollmentForm">
            <input type="text" id="regName" placeholder="Student Full Name" required>
            <input type="text" id="regSchool" placeholder="School Name" required>
            <input type="tel" id="regPhone" placeholder="WhatsApp Number (e.g. 070 123 4567)" required>
<input type="email" id="regEmail" placeholder="Email Address (for invoices)" required>

            <select id="regGrade">
                <option value="Grade 10">Grade 10</option>
                <option value="Grade 11">Grade 11</option>
                <option value="Grade 12">Grade 12</option>
            </select>

            <div class="program-selection">
                <p>Select Your Program:</p>
                <label>
                    <input type="checkbox" name="prog" value="Full Program (R300)" id="fullProg"> Full Academic Program (R300)
                </label><br>
                <label>
                    <input type="checkbox" name="prog" value="Mathematics (R100)" class="indiv"> Mathematics (R100)
                </label><br>
                <label>
                    <input type="checkbox" name="prog" value="Physical Sciences (R100)" class="indiv"> Physical Sciences (R100)
                </label><br>                <label>
                  <input type="checkbox" name="prog" value="Life Sciences (R100)" class="indiv"> Life Sciences (R100)
                </label><br>  
                <label>
                  <input type="checkbox" name="prog" value="English (R100)" class="indiv"> English (R100)
                </label>
            </div>

            <select id="payMethod">
                <option value="EFT/Banking">EFT / Banking Details</option>
                <option value="Cash in Class">Pay in Class (Cash/Card)</option>
            </select>

            <button type="button" onclick="submitRegistration()">Confirm Registration</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
    <a href="index.html" style="color: #666; text-decoration: none; font-size: 14px;">
        ← Back to Home Page
    </a>
</div>

    </section>

    <script src="script.js"></script>
</body>
</html>
